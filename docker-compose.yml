
services:
  # Service 1: The Bank Database (PostgreSQL)
  sky-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sky_admin
      POSTGRES_PASSWORD: bank_password
      POSTGRES_DB: sky_bank
    networks:
      - sky-network
    volumes:
      - sky-db-data:/var/lib/postgresql/data

  # Service 2: The Bank API (Backend)
  sky-api:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      # We use the service name 'sky-db' as the hostname
      DATABASE_URL: "postgresql://sky_admin:bank_password@sky-db:5432/sky_bank"
    depends_on:
      - sky-db
    networks:
      - sky-network

  # Service 3: The Bank Frontend
  sky-frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - sky-api
    networks:
      - sky-network

# Define the shared network for all containers to talk to each other
networks:
  sky-network:
    driver: bridge

# Define the volume so your bank data survives a restart
volumes:
  sky-db-data: