<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sky Bank Pro | Dashboard</title>
        <style>
            body {
                font-family: 'Inter', sans-serif;
                background: #0a0b0d;
                color: white;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            .glass-card {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                padding: 40px;
                border-radius: 24px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                width: 400px;
                text-align: center;
            }
            .balance {
                font-size: 3rem;
                font-weight: 700;
                color: #00d2ff;
                margin: 20px 0;
            }
            button {
                background: #00d2ff;
                border: none;
                padding: 12px 24px;
                border-radius: 12px;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
                width: 100%;
                margin-top: 10px;
            }
            button:hover {
                background: #0099ff;
                transform: scale(1.02);
            }
            .status {
                margin-top: 15px;
                font-size: 0.9rem;
                color: #888;
            }
        </style>
    </head>
    <body>
        <div class="glass-card">
            <div style="color: #888;">Available Balance</div>
            <div class="balance" id="balance">$0.00</div>
            <button onclick="fetchBalance()">Refresh Securely</button>
            <div class="status" id="status">Connecting to Backend API...</div>
        </div>

        <script>
            async function fetchBalance() {
                try {
                    const response = await fetch('https://special-lamp-5gg4p5pw594qcp455-5000.app.github.dev/api/balance', {
                        headers: {
                            "X-Github-Token": "anything",
                            "Accept": "application/json",
                            "X-Requested-With": "XMLHttpRequest"
                        }
                    });

                    if (!response.ok) throw new Error('Network response was not ok');

                    const data = await response.json();
                    document.getElementById('balance').innerText = `$${data.balance.toLocaleString()}`;
                    document.getElementById('status').innerText = "System Operational";
                    document.getElementById('status').style.color = "#00ff88";
                } catch (err) {
                    document.getElementById('status').innerText = "API Offline";
                }
            }
        </script>
    </body>
</html>
